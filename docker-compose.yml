version: "3.8"

services:
  proxy:
    build: .
    container_name: shadow-proxy
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PROXY_PORT=8080
      - PROXY_HOST=0.0.0.0
      - CACHE_ENABLED=true
      - CACHE_TTL=300
      - CACHE_MAX_SIZE=1000
      - REDIS_ENABLED=true
      - REDIS_URL=redis://redis:6379
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX_REQUESTS=100
      - LB_ALGORITHM=round-robin
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    depends_on:
      - redis
    networks:
      - proxy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: shadow-proxy-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - proxy-network
    restart: unless-stopped
    command: redis-server --appendonly yes

volumes:
  redis-data:

networks:
  proxy-network:
    driver: bridge
